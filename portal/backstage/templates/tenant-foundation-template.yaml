apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: platform-tenant-foundation
  title: Platform Tenant Foundation
  description: Request tenant network, firewall, volume, backup, and access contracts.
spec:
  owner: platform-team
  type: service
  parameters:
    - title: Tenant Foundation
      required: ["projectRef", "namespace", "networkName", "cidr", "volumeName", "volumeSize", "adminsGroup"]
      properties:
        projectRef:
          title: Project
          type: string
        namespace:
          title: Namespace
          type: string
        networkName:
          title: Network name
          type: string
          default: private
        cidr:
          title: Network CIDR
          type: string
          default: 10.244.0.0/24
        volumeName:
          title: Volume name
          type: string
          default: data
        volumeSize:
          title: Volume size
          type: string
          default: 5Gi
        adminsGroup:
          title: Admins group
          type: string
          default: platform:tenant-a:admins
  steps:
    - id: render
      name: Render tenant foundation contracts
      action: fetch:template
      input:
        url: ./skeleton
        values:
          projectRef: ${{ parameters.projectRef }}
          namespace: ${{ parameters.namespace }}
          networkName: ${{ parameters.networkName }}
          cidr: ${{ parameters.cidr }}
          volumeName: ${{ parameters.volumeName }}
          volumeSize: ${{ parameters.volumeSize }}
          adminsGroup: ${{ parameters.adminsGroup }}
  output:
    text:
      - title: Next step
        content: Submit the rendered Network, FirewallRule, Volume, BackupPlan, and AccessGrant manifests through GitOps or the provider API.
