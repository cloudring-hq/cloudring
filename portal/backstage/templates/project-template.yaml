apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: platform-project
  title: Platform Project
  description: Request a tenant project with quotas and default-deny networking.
spec:
  owner: platform-team
  type: service
  parameters:
    - title: Project
      required: ["tenantId", "tier"]
      properties:
        tenantId:
          title: Tenant ID
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
        tier:
          title: Isolation tier
          type: string
          enum: ["shared", "dedicated-node-pool", "dedicated-cluster", "dedicated-cell"]
        cpu:
          title: CPU quota
          type: string
          default: "2"
        memory:
          title: Memory quota
          type: string
          default: 2Gi
  steps:
    - id: render
      name: Render Project claim
      action: fetch:template
      input:
        url: ./skeleton
        values:
          tenantId: ${{ parameters.tenantId }}
          tier: ${{ parameters.tier }}
          cpu: ${{ parameters.cpu }}
          memory: ${{ parameters.memory }}
  output:
    text:
      - title: Next step
        content: Submit the rendered Project manifest through GitOps or the provider API.
