apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: platform-vm
  title: Platform Virtual Machine
  description: Request a VM through VirtualMachineClaim.
spec:
  owner: platform-team
  type: service
  parameters:
    - title: VM
      required: ["projectRef", "name", "class", "image"]
      properties:
        projectRef:
          title: Project
          type: string
        name:
          title: Name
          type: string
        class:
          title: Class
          type: string
          enum: ["tiny", "small", "medium", "large"]
        image:
          title: Image
          type: string
          default: cirros
  steps:
    - id: render
      name: Render VM claim
      action: fetch:template
      input:
        url: ./skeleton
        values:
          projectRef: ${{ parameters.projectRef }}
          name: ${{ parameters.name }}
          class: ${{ parameters.class }}
          image: ${{ parameters.image }}
