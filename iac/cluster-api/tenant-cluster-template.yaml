apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: tenant-a-demo
  namespace: tenant-a
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["10.243.0.0/16"]
    services:
      cidrBlocks: ["10.95.0.0/16"]
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
    kind: KubevirtCluster
    name: tenant-a-demo
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: tenant-a-demo-control-plane
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtCluster
metadata:
  name: tenant-a-demo
  namespace: tenant-a
spec:
  # Lab-only internal endpoint. Production exposure must be provider-managed.
  controlPlaneServiceTemplate:
    spec:
      type: ClusterIP
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: tenant-a-demo-control-plane
  namespace: tenant-a
spec:
  replicas: 1
  version: v1.32.1
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
      kind: KubevirtMachineTemplate
      name: tenant-a-demo-control-plane
  kubeadmConfigSpec:
    clusterConfiguration:
      networking:
        dnsDomain: tenant-a-demo.tenant-a.local
        podSubnet: 10.243.0.0/16
        serviceSubnet: 10.95.0.0/16
    initConfiguration:
      nodeRegistration:
        criSocket: unix:///var/run/containerd/containerd.sock
      timeouts:
        controlPlaneComponentHealthCheck: 10m0s
        kubeletHealthCheck: 6m0s
        kubernetesAPICall: 2m0s
    joinConfiguration:
      nodeRegistration:
        criSocket: unix:///var/run/containerd/containerd.sock
      timeouts:
        discovery: 10m0s
        tlsBootstrap: 10m0s
        kubernetesAPICall: 2m0s
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: KubevirtMachineTemplate
metadata:
  name: tenant-a-demo-control-plane
  namespace: tenant-a
spec:
  template:
    spec:
      virtualMachineBootstrapCheck:
        checkStrategy: ssh
      virtualMachineTemplate:
        metadata:
          namespace: tenant-a
        spec:
          runStrategy: Always
          dataVolumeTemplates:
            - metadata:
                name: rootdisk
              spec:
                source:
                  registry:
                    url: docker://quay.io/capk/ubuntu-2404-container-disk:v1.32.1
                    pullMethod: pod
                storage:
                  storageClassName: longhorn
                  accessModes:
                    - ReadWriteOnce
                  volumeMode: Filesystem
                  resources:
                    requests:
                      storage: 12Gi
          template:
            spec:
              domain:
                cpu:
                  cores: 2
                memory:
                  guest: 2Gi
                devices:
                  networkInterfaceMultiqueue: true
                  interfaces:
                    - name: default
                      masquerade: {}
                      ports:
                        - name: ssh
                          port: 22
                        - name: apiserver
                          port: 6443
                  disks:
                    - name: rootdisk
                      bootOrder: 1
                      disk:
                        bus: virtio
              evictionStrategy: External
              networks:
                - name: default
                  pod: {}
              volumes:
                - name: rootdisk
                  dataVolume:
                    name: rootdisk
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: tenant-a-demo-md-0
  namespace: tenant-a
spec:
  clusterName: tenant-a-demo
  replicas: 0
  selector:
    matchLabels: null
  template:
    spec:
      clusterName: tenant-a-demo
      version: v1.32.1
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: tenant-a-demo-md-0
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
        kind: KubevirtMachineTemplate
        name: tenant-a-demo-md-0
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: tenant-a-demo-md-0
  namespace: tenant-a
spec:
  template:
        spec:
          joinConfiguration:
            nodeRegistration:
              criSocket: unix:///var/run/containerd/containerd.sock
            timeouts:
              discovery: 10m0s
              tlsBootstrap: 10m0s
              kubernetesAPICall: 2m0s
---
