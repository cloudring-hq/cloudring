apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-tenant-restore-isolation-policy
  namespace: platform-system
  labels:
    platform.privatecloud.local/component: backup
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  defaultRestoreMode: "copy-restore"
  inPlaceRestorePolicy: "provider-admin-approval-required"
  tenantAuthorization: "Project.spec.adminsGroup plus token namespace scope"
  auditSurface: "RestoreRequest status and SelfServiceAuditEvent"
  namespacePolicy: |
    - namespaceMapping is required for Namespace and KubernetesClusterClaim copy restore.
    - Restored namespace names must be provider-generated or explicitly approved.
    - Source namespace labels and annotations are copied only from an allowlist.
    - Pod Security labels, default-deny NetworkPolicy, ResourceQuota, and LimitRange are reconciled before workloads are started.
    - Tenant RBAC is recreated for the restored namespace and never grants cross-tenant access.
  resourceFilteringPolicy: |
    - Use Velero includedNamespaces, includedResources, excludedResources, or resource policies for every restore.
    - Exclude provider platform namespaces unless the target kind explicitly requires provider-owned gateway resources.
    - Exclude cluster-scoped RBAC, StorageClass, CRD, webhook, and APF objects from tenant-visible restores.
    - Restore resource modifiers must rewrite namespace, owner, and provider labels for copy restore.
    - Existing target resources cause rejection unless collisionPolicy is explicitly approved.
  volumePolicy: |
    - Restore into a new PVC or provider Volume object by default.
    - Never bind a restored tenant PVC to another tenant namespace.
    - Do not delete source PVCs during restore.
    - Retain source VolumeSnapshot and VolumeSnapshotContent until restore verification passes.
  tenantClusterPolicy: |
    - Restore provider KubernetesClusterClaim, CAPI/CAPK objects, kubeconfig/control-plane secrets, and control-plane volumes together.
    - Reissue or rotate tenant kubeconfig before publishing restored apiEndpoint.
    - Recreate provider gateway and NetworkPolicy before tenant API exposure.
    - Do not reuse source cluster service VIP unless explicitly approved.
  denialPolicy: |
    - Deny cross-tenant restore.
    - Deny restore from a BackupPlan the tenant cannot read.
    - Deny restore to a namespace outside token namespace scope.
    - Deny in-place restore without provider-admin approval.
