apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-production-backup-contract
  namespace: platform-system
  labels:
    platform.privatecloud.local/component: backup
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  supportedBackupTargets: "VirtualMachineClaim,Volume,Namespace,KubernetesClusterClaim"
  currentLabRuntime: "VirtualMachineClaim snapshots and copy restore only"
  productionBackend: "Velero EnableCSI plus off-cell immutable object storage"
  vmRestoreMode: "copy-restore-to-new-vm"
  volumeRestoreMode: "copy-restore-to-new-volume-claim"
  namespaceRestoreMode: "copy-restore-to-new-namespace-or-approved-in-place"
  tenantClusterRestoreMode: "restore-provider-claim-capi-objects-kubeconfig-and-control-plane-volumes"
  tenantIsolation: "tenant can restore only within Project.spec.adminsGroup and token namespace scope"
  collisionPolicy: "reject-existing-target-by-default"
  approvalPolicy: "required-for-namespace-and-tenant-cluster-restore"
  immutableStoragePolicy: "object-lock-or-equivalent-required"
  restoreDrillFrequency: "monthly-per-cell-plus-before-upgrade"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-velero-restore-templates
  namespace: velero
  labels:
    platform.privatecloud.local/component: backup
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  volume-restore.yaml: |
    apiVersion: velero.io/v1
    kind: Restore
    metadata:
      name: REPLACE_WITH_VOLUME_RESTORE_NAME
      namespace: velero
    spec:
      backupName: REPLACE_WITH_BACKUP_NAME
      includedNamespaces:
        - REPLACE_WITH_TENANT_NAMESPACE
      includedResources:
        - persistentvolumeclaims
        - persistentvolumes
        - volumesnapshots.snapshot.storage.k8s.io
        - volumesnapshotcontents.snapshot.storage.k8s.io
        - volumes.platform.privatecloud.local
      namespaceMapping:
        REPLACE_WITH_TENANT_NAMESPACE: REPLACE_WITH_RESTORE_NAMESPACE
  namespace-restore.yaml: |
    apiVersion: velero.io/v1
    kind: Restore
    metadata:
      name: REPLACE_WITH_NAMESPACE_RESTORE_NAME
      namespace: velero
    spec:
      backupName: REPLACE_WITH_BACKUP_NAME
      includedNamespaces:
        - REPLACE_WITH_TENANT_NAMESPACE
      namespaceMapping:
        REPLACE_WITH_TENANT_NAMESPACE: REPLACE_WITH_RESTORE_NAMESPACE
      existingResourcePolicy: none
  tenant-cluster-restore.yaml: |
    apiVersion: velero.io/v1
    kind: Restore
    metadata:
      name: REPLACE_WITH_TENANT_CLUSTER_RESTORE_NAME
      namespace: velero
    spec:
      backupName: REPLACE_WITH_BACKUP_NAME
      includedNamespaces:
        - REPLACE_WITH_TENANT_NAMESPACE
        - capk-system
      includedResources:
        - kubernetesclusterclaims.platform.privatecloud.local
        - clusters.cluster.x-k8s.io
        - machines.cluster.x-k8s.io
        - machinedeployments.cluster.x-k8s.io
        - kubeadmcontrolplanes.controlplane.cluster.x-k8s.io
        - kubevirtclusters.infrastructure.cluster.x-k8s.io
        - kubevirtmachines.infrastructure.cluster.x-k8s.io
        - secrets
        - services
        - deployments.apps
        - networkpolicies.networking.k8s.io
      namespaceMapping:
        REPLACE_WITH_TENANT_NAMESPACE: REPLACE_WITH_RESTORE_NAMESPACE
        capk-system: capk-system
