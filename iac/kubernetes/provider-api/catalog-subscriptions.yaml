apiVersion: platform.privatecloud.local/v1alpha1
kind: ProductPlan
metadata:
  name: vm-basic
spec:
  displayName: Basic VM
  description: Small always-on VM service class for demo and light internal workloads.
  category: compute
  visibility: public
  lifecycle:
    state: Published
  service:
    kind: VirtualMachineClaim
    serviceClass: tiny-vm
    defaultImage: cirros
    capacityCellSelector:
      region: lab
      site: ws0
      zone: single-host
      storage: longhorn-lab
  quotaProfile:
    cpu: 1000m
    memory: 1Gi
    vms: 1
    volumes: 1
  commercial:
    billingMode: free
    currency: USD
    terms:
      trialDays: 0
      cancellation: immediate
---
apiVersion: platform.privatecloud.local/v1alpha1
kind: Subscription
metadata:
  name: tenant-a-vm-basic
  namespace: tenant-a
spec:
  projectRef: tenant-a
  planRef: vm-basic
  displayName: Tenant A Basic VM subscription
  state: Active
  autoRenew: true
  requestedBy: platform:tenant-a:admins
---
apiVersion: platform.privatecloud.local/v1alpha1
kind: Order
metadata:
  name: tenant-a-vm-basic-order
  namespace: tenant-a
spec:
  projectRef: tenant-a
  action: CreateSubscription
  state: Submitted
  planRef: vm-basic
  subscriptionRef: tenant-a-vm-basic-ordered
  idempotencyKey: tenant-a-vm-basic-order-v1
  requestedBy: platform:tenant-a:admins
  policy:
    decision: Allowed
  approval:
    required: false
  budget:
    currency: USD
    estimatedMonthly: "0"
  parameters: {}
