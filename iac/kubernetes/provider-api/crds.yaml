                    cpu:
                      type: string
                    memory:
                      type: string
                    claims:
                      type: integer
                available:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    pods:
                      type: string
                nodes:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
