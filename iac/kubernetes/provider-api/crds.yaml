apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.platform.privatecloud.local
spec:
  group: platform.privatecloud.local
  scope: Cluster
  names:
    plural: projects
    singular: project
    kind: Project
    shortNames: ["prj"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["tenantId", "tier", "quotas"]
              properties:
                tenantId:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{1,61}[a-z0-9]$"
                displayName:
                  type: string
                tier:
                  type: string
                  enum: ["shared", "dedicated-node-pool", "dedicated-cluster", "dedicated-cell"]
                adminsGroup:
                  type: string
                quotas:
                  type: object
                  required: ["cpu", "memory", "vms", "tenantClusters", "volumes"]
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    vms:
                      type: integer
                      minimum: 0
                    tenantClusters:
                      type: integer
                      minimum: 0
                    volumes:
                      type: integer
                      minimum: 0
                network:
                  type: object
                  properties:
                    defaultDeny:
                      type: boolean
                    allowInternetEgress:
                      type: boolean
                    allowedLoadBalancers:
                      type: integer
                      minimum: 0
            status:
              type: object
              properties:
                phase:
                  type: string
                namespaces:
                  type: array
                  items:
                    type: string
                quotaUsage:
                  type: object
                  properties:
                    cpu:
                      type: string
                    memory:
                      type: string
                    vms:
                      type: integer
                    tenantClusters:
                      type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.tenantId
        - name: Tier
          type: string
          jsonPath: .spec.tier
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
---
apiVersion: apiextensions.k8s.io/v1
