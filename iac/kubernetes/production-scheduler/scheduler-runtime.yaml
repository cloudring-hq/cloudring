apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-scheduler
  namespace: platform-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
rules:
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - capacitycells
      - capacityreservations
      - admissionjournals
      - projects
      - virtualmachineclaims
      - kubernetesclusterclaims
      - volumes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - capacityreservations
      - admissionjournals
    verbs: ["create", "update", "patch"]
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - capacityreservations/status
      - projects/status
      - virtualmachineclaims/status
      - kubernetesclusterclaims/status
      - volumes/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-scheduler
subjects:
  - kind: ServiceAccount
    name: provider-scheduler
    namespace: platform-scheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-scheduler
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler
    app.kubernetes.io/component: scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provider-scheduler
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: provider-scheduler
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: provider-scheduler
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: provider-scheduler
              topologyKey: kubernetes.io/hostname
      containers:
        - name: provider-scheduler
          image: REPLACE_WITH_PROVIDER_SCHEDULER_IMAGE
          imagePullPolicy: IfNotPresent
          args:
            - --leader-election=true
            - --leader-election-lease=provider-scheduler
            - --placement-model=filter-score-reserve-permit
            - --cell-source=CapacityCell
            - --reservation-kind=CapacityReservation
            - --journal-kind=AdmissionJournal
            - --quota-source=Project.status.quotaUsage
            - --optimistic-concurrency=resourceVersion
            - --metrics-address=:8080
            - --health-address=:8081
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: provider-scheduler
  namespace: platform-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-scheduler
---
apiVersion: v1
kind: Service
metadata:
  name: provider-scheduler-metrics
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  selector:
    app.kubernetes.io/name: provider-scheduler
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
