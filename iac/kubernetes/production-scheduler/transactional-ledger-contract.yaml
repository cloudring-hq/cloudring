apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-transactional-admission-contract
  namespace: platform-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  ledger-contract.yaml: |
    apiVersion: platform.privatecloud.local/v1alpha1
    kind: ProviderTransactionalAdmissionContract
    metadata:
      name: default
    spec:
      transactionModel:
        idempotencyKey: claim UID plus generation
        optimisticConcurrency: resourceVersion
        locks:
          projectQuota: project-quota-admission-<projectRef>
          capacity: capacity-admission-<capacityCell>
          replayOwner: provider-scheduler-replay
        committedLedgers:
          reservation: CapacityReservation
          admissionAudit: AdmissionJournal
          quotaSnapshot: Project.status.quotaUsage
      commitOrder:
        - Read claim, Project, CapacityCell, CapacityReservation, and AdmissionJournal snapshots with resourceVersion.
        - Acquire projectQuota Lease and then capacity Lease in stable lexical order.
        - Run Filter and Score against current CapacityCell inventory.
        - Recheck Project.status.quotaUsage and selected CapacityCell availability under the held Leases.
        - Create or renew the committed CapacityReservation for the selected cell.
        - Create the write-once AdmissionJournal record for Admitted, Rejected, or Pending decisions.
        - Patch claim status.admission observedGeneration, capacityCell, serviceClass, and estimatedResources.
        - Permit backing reconciliation only after reservation, quota, and journal commits succeed.
      rollbackOrder:
        - If Commit fails before backing resources exist, release or expire the CapacityReservation.
        - If backing reconciliation already started, finalizers must clean KubeVirt, CAPI/CAPK, CDI, storage, network, and reservation resources.
        - Rejected claims must not retain Active CapacityReservation objects.
      replay:
        owner: single active replay coordinator elected with Kubernetes Lease
        sources:
          - AdmissionJournal ordered by observedAt and resourceVersion
          - Active CapacityReservation with unexpired expiresAt
          - Current Project.status.quotaUsage
        actions:
          - Rebuild accepted reservation and quota intent from AdmissionJournal records.
          - Ignore stale Active reservations after expiresAt.
          - Emit a corrective AdmissionJournal record when replay detects orphaned backing resources.
          - Reconcile quota usage to the active reservation set before admitting new claims.
      invariant:
        summary: No backing objects before commit.
        noBackingObjectsBeforeCommit: true
        tenantCannotReadAdmissionJournal: true
        allAdmissionResultsAreAuditable: true
        allLocksHaveBoundedTTL: true
