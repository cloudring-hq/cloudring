spec:
  template:
    spec:
      containers:
        - name: controller
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            timeoutSeconds: 5
            failureThreshold: 6
        - name: frr
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            timeoutSeconds: 5
            failureThreshold: 60
        - name: reloader
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: frr-metrics
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: frr-status
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
