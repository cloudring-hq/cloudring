apiVersion: v1
kind: ConfigMap
metadata:
  name: capk-oidc-runtime-cutover-readiness
  namespace: platform-system
  labels:
    platform.privatecloud.local/component: production-readiness
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/lab-disabled-by-default: "true"
data:
  readiness-contract: capk-larger-cell-and-oidc-jwks-runtime
  required-live-evidence: cellProfile,tenantCluster,identity
  capk-required-fields: cellProfile.managementNodesReady,tenantCluster.controlPlaneReplicas,tenantCluster.workerPools,tenantCluster.scaleProof,tenantCluster.upgradeProof,tenantCluster.kubeconfigHandoff,tenantCluster.antiAffinity,tenantCluster.restartReplacement,tenantCluster.providerRoutedEndpoint,tenantCluster.crossTenantKubeconfig
  oidc-required-fields: identity.mode,identity.issuer,identity.jwksUri,identity.allowedAlgorithms,identity.groupsClaim,identity.namespacesClaim,identity.labHs256EnvPresent,identity.validTenantToken,identity.crossTenantToken,identity.invalidSignature,identity.expiredToken
  final-claim-rule: final aggregate completion requires a larger-cell live evidence file and an external OIDC/JWKS runtime evidence file; offline contract evidence is non-final
  fail-closed-policy: missing live evidence, single control plane, zero workers, missing scale proof, missing upgrade proof, missing kubeconfig handoff, missing anti-affinity, missing restart replacement, lab HS256 runtime, placeholder OIDC issuer, missing JWKS URI, HS256 allowed, cross-tenant kubeconfig allowed, or lab overlay reference fails

