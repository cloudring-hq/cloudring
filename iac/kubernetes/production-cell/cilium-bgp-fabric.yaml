apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: production-cell-public
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  allowFirstLastIPs: "No"
  blocks:
    - start: REPLACE_WITH_LB_POOL_START
      stop: REPLACE_WITH_LB_POOL_STOP
  serviceSelector:
    matchLabels:
      platform.privatecloud.local/expose: routed
---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: production-cell-peer
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 120
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: production-cell
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: production-cell-bgp
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  nodeSelector:
    matchLabels:
      node-role.platform.privatecloud.local/fabric: "true"
  bgpInstances:
    - name: production-cell-v4
      localASN: REPLACE_WITH_CELL_ASN
      peers:
        - name: tor-a
          peerASN: REPLACE_WITH_TOR_ASN
          peerAddress: REPLACE_WITH_TOR_A_ADDRESS
          peerConfigRef:
            name: production-cell-peer
        - name: tor-b
          peerASN: REPLACE_WITH_TOR_ASN
          peerAddress: REPLACE_WITH_TOR_B_ADDRESS
          peerConfigRef:
            name: production-cell-peer
---
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: production-cell-services
  labels:
    app.kubernetes.io/part-of: platform-production-cell
    advertise: production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchLabels:
          platform.privatecloud.local/expose: routed
      attributes:
        communities:
          standard: ["REPLACE_WITH_BGP_COMMUNITY"]
