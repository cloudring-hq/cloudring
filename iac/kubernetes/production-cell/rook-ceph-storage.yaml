apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: production-cell
  namespace: rook-ceph
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v20.2.2
    allowUnsupported: false
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    modules:
      - name: pg_autoscaler
        enabled: true
  dashboard:
    enabled: true
    ssl: true
  crashCollector:
    disable: false
  disruptionManagement:
    managePodBudgets: true
    osdMaintenanceTimeout: 30
  storage:
    useAllNodes: false
    useAllDevices: false
    nodes:
      - name: REPLACE_WITH_STORAGE_NODE_A
        devices:
          - name: /dev/disk/by-id/REPLACE_WITH_OSD_DEVICE_A
      - name: REPLACE_WITH_STORAGE_NODE_B
        devices:
          - name: /dev/disk/by-id/REPLACE_WITH_OSD_DEVICE_B
      - name: REPLACE_WITH_STORAGE_NODE_C
        devices:
          - name: /dev/disk/by-id/REPLACE_WITH_OSD_DEVICE_C
  placement:
    all:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.platform.privatecloud.local/storage
                  operator: In
                  values: ["true"]
      tolerations:
        - key: node-role.platform.privatecloud.local/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
---
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: tenant-rbd
  namespace: rook-ceph
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  failureDomain: rack
  replicated:
    size: 3
    requireSafeReplicaSize: true
  parameters:
    compression_mode: aggressive
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rook-ceph-rbd
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    platform.privatecloud.local/template-only: "true"
provisioner: rook-ceph.rbd.csi.ceph.com
parameters:
  clusterID: rook-ceph
  pool: tenant-rbd
  imageFormat: "2"
  imageFeatures: layering
  csi.storage.k8s.io/fstype: ext4
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: tenant-cephfs
  namespace: rook-ceph
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  metadataPool:
    failureDomain: rack
    replicated:
      size: 3
  dataPools:
    - name: replicated
      failureDomain: rack
      replicated:
        size: 3
  metadataServer:
    activeCount: 2
    activeStandby: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rook-cephfs
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
    platform.privatecloud.local/template-only: "true"
provisioner: rook-ceph.cephfs.csi.ceph.com
parameters:
  clusterID: rook-ceph
  fsName: tenant-cephfs
  pool: tenant-cephfs-replicated
  csi.storage.k8s.io/fstype: ext4
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: tenant-rgw
  namespace: rook-ceph
  labels:
    app.kubernetes.io/part-of: platform-production-cell
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  metadataPool:
    failureDomain: rack
    replicated:
      size: 3
  dataPool:
    failureDomain: rack
    replicated:
      size: 3
  gateway:
    instances: 3
    port: 80
    placement:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.platform.privatecloud.local/infra
                  operator: In
                  values: ["true"]
