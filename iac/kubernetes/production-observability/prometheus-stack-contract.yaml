apiVersion: v1
kind: Secret
metadata:
  name: provider-observability-remote-write
  namespace: observability
  labels:
    app.kubernetes.io/name: provider-observability
    platform.privatecloud.local/component: observability
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/requires-secret-manager: "true"
type: Opaque
stringData:
  endpoint: "REPLACE_WITH_REMOTE_WRITE_URL"
  username: "REPLACE_WITH_REMOTE_WRITE_USERNAME"
  password: "REPLACE_WITH_REMOTE_WRITE_PASSWORD_FROM_SECRET_MANAGER"
---
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: provider-alertmanager
  namespace: observability
  labels:
    app.kubernetes.io/name: provider-observability
    platform.privatecloud.local/observability: provider
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  replicas: 3
  retention: 120h
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: REPLACE_WITH_PRODUCTION_BLOCK_STORAGE_CLASS
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: REPLACE_WITH_ALERTMANAGER_VOLUME_SIZE
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
---
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: provider-prometheus
  namespace: observability
  labels:
    app.kubernetes.io/name: provider-observability
    platform.privatecloud.local/observability: provider
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  replicas: 2
  shards: 2
  retention: 15d
  walCompression: true
  serviceMonitorSelector:
    matchLabels:
      platform.privatecloud.local/observability: provider
  serviceMonitorNamespaceSelector:
    matchLabels:
      platform.privatecloud.local/observability-scope: enabled
  ruleSelector:
    matchLabels:
      platform.privatecloud.local/observability: provider
  ruleNamespaceSelector:
    matchLabels:
      platform.privatecloud.local/observability-scope: enabled
  alerting:
    alertmanagers:
      - namespace: observability
        name: alertmanager-provider-alertmanager
        port: web
  remoteWrite:
    - url: "REPLACE_WITH_REMOTE_WRITE_URL"
      basicAuth:
        username:
          name: provider-observability-remote-write
          key: username
        password:
          name: provider-observability-remote-write
          key: password
  storage:
    volumeClaimTemplate:
      spec:
        storageClassName: REPLACE_WITH_PRODUCTION_BLOCK_STORAGE_CLASS
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: REPLACE_WITH_PROMETHEUS_VOLUME_SIZE
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
