apiVersion: v1
kind: Secret
metadata:
  name: provider-telemetry-backends
  namespace: observability
  labels:
    app.kubernetes.io/name: provider-observability
    platform.privatecloud.local/component: telemetry
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/requires-secret-manager: "true"
type: Opaque
stringData:
  loki-endpoint: "REPLACE_WITH_LOKI_ENDPOINT"
  loki-tenant-id: "REPLACE_WITH_LOKI_TENANT_ID"
  loki-token: "REPLACE_WITH_LOKI_TOKEN_FROM_SECRET_MANAGER"
  otlp-endpoint: "REPLACE_WITH_OTLP_GATEWAY_ENDPOINT"
  otlp-token: "REPLACE_WITH_OTLP_TOKEN_FROM_SECRET_MANAGER"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-telemetry-pipeline-contract
  namespace: observability
  labels:
    app.kubernetes.io/name: provider-observability
    platform.privatecloud.local/component: telemetry
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  collectorTopology: "daemonset-agents-plus-deployment-gateway"
  nodeAgentSignals: "container-logs,kubeletstats,hostmetrics,otlp"
  gatewaySignals: "cluster-events,provider-audit-events,traces,metrics"
  requiredAttributes: "cluster,cell,namespace,tenant,project,workload,resource.kind,resource.name"
  sensitiveAttributePolicy: "drop-token-secret-password-authorization-cookie"
  logBackend: "loki"
  logRetentionDays: "30"
  lokiRetentionMode: "compactor-retention-enabled"
  objectStoreLifecycle: "longer-than-loki-retention"
  traceBackend: "otlp-compatible"
  metricBackend: "prometheus-plus-remote-write"
  tenantIsolation: "tenant-labels-for-query-rbac-do-not-share-raw-infra-namespaces"
  alertRouting: "platform-critical,platform-warning,tenant-visible"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-slo-contract
  namespace: observability
  labels:
    app.kubernetes.io/name: provider-observability
    platform.privatecloud.local/component: slo
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  providerApiAvailabilityMonthly: "99.95"
  providerApiConditionalReadP95Ms: "2500"
  providerControllerReconcileFreshnessSeconds: "300"
  providerPortalMinimumAvailableReplicas: "2"
  kubevirtManagementMinimumAvailableReplicas: "2"
  alertAckCriticalMinutes: "15"
  auditEventRetentionDays: "7"
  admissionJournalRetentionDays: "7"
