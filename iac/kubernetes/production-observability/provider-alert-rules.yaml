apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: provider-control-plane-slo
  namespace: observability
  labels:
    platform.privatecloud.local/observability: provider
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  groups:
    - name: provider.control-plane.availability
      rules:
        - alert: ProviderControllerShardLeaderMissing
          expr: |
            sum by (shard_index) (
              provider_controller_leader
              * on(identity) group_left(shard_index, shard_total)
              provider_controller_shard_info
            ) < 1
          for: 2m
          labels:
            severity: critical
            service: provider-controller
          annotations:
            summary: Provider controller shard has no active leader
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-controller-shard-leader-missing
        - alert: ProviderControllerReconcileStale
          expr: time() - max(provider_controller_last_success_timestamp_seconds) > 300
          for: 5m
          labels:
            severity: critical
            service: provider-controller
          annotations:
            summary: Provider controller has not completed a successful reconcile recently
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-controller-reconcile-stale
        - alert: ProviderControllerReconcileErrors
          expr: sum(increase(provider_controller_reconcile_total{result="error"}[10m])) > 0
          for: 5m
          labels:
            severity: warning
            service: provider-controller
          annotations:
            summary: Provider controller is recording failed reconcile attempts
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-controller-reconcile-errors
    - name: provider.portal.api
      rules:
        - alert: ProviderPortalBackendErrors
          expr: sum(increase(provider_portal_write_requests_total{status=~"5.."}[10m])) > 0
          for: 5m
          labels:
            severity: critical
            service: provider-portal
          annotations:
            summary: Provider portal write path is returning backend errors
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-portal-backend-errors
        - alert: ProviderPortalSummaryRefreshErrors
          expr: increase(provider_portal_summary_refresh_errors_total[10m]) > 0
          for: 5m
          labels:
            severity: warning
            service: provider-portal
          annotations:
            summary: Provider portal summary cache refresh is failing
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-portal-summary-refresh-errors
        - alert: ProviderPortalHighWriteThrottleRatio
          expr: |
            sum(rate(provider_portal_write_requests_total{status="429"}[10m]))
            /
            clamp_min(sum(rate(provider_portal_write_requests_total[10m])), 1)
            > 0.25
          for: 10m
          labels:
            severity: warning
            service: provider-portal
          annotations:
            summary: Provider portal is throttling an unusually high write ratio
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-portal-high-write-throttle-ratio
        - alert: ProviderPortalSlowSummaryRefresh
          expr: |
            rate(provider_portal_summary_refresh_seconds_sum[10m])
            /
            clamp_min(rate(provider_portal_summary_refresh_seconds_count[10m]), 1)
            > 2
          for: 10m
          labels:
            severity: warning
            service: provider-portal
          annotations:
            summary: Provider portal summary refresh is slow
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-portal-slow-summary-refresh
    - name: provider.substrate.health
      rules:
        - alert: KubeVirtManagementReplicaLoss
          expr: |
            kube_deployment_status_replicas_available{
              namespace="kubevirt",
              deployment=~"virt-api|virt-controller|virt-operator"
            } < 2
          for: 5m
          labels:
            severity: critical
            service: kubevirt
          annotations:
            summary: KubeVirt management component has lost HA quorum
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/kubevirt-management-replica-loss
        - alert: ProviderPortalReplicaFloorBroken
          expr: kube_deployment_status_replicas_available{namespace="platform-system",deployment="provider-portal"} < 2
          for: 5m
          labels:
            severity: critical
            service: provider-portal
          annotations:
            summary: Provider portal has fewer than two available replicas
            runbook_url: https://REPLACE_WITH_RUNBOOK_BASE_URL/provider-portal-replica-floor-broken
