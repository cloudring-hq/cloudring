apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-gitops-source
  namespace: flux-system
  labels:
    app: platform-gitops-source
spec:
  replicas: 3
  selector:
    matchLabels:
      app: platform-gitops-source
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: platform-gitops-source
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 3
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          matchLabelKeys:
            - pod-template-hash
          labelSelector:
            matchLabels:
              app: platform-gitops-source
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: platform-gitops-source
                topologyKey: kubernetes.io/hostname
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: git-http
          image: localhost/platform-gitops-source:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /platform.git/HEAD
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /platform.git/HEAD
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-gitops-source
  namespace: flux-system
  labels:
    app: platform-gitops-source
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: platform-gitops-source
---
apiVersion: v1
kind: Service
metadata:
  name: platform-gitops-source
  namespace: flux-system
  labels:
    app: platform-gitops-source
spec:
  type: ClusterIP
  selector:
    app: platform-gitops-source
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: source-controller
  namespace: flux-system
  labels:
    app: source-controller
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: source-controller
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kustomize-controller
  namespace: flux-system
  labels:
    app: kustomize-controller
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: kustomize-controller
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: helm-controller
  namespace: flux-system
  labels:
    app: helm-controller
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: helm-controller
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-controller
  namespace: flux-system
  labels:
    app: notification-controller
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: notification-controller
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: platform-gitops
  namespace: flux-system
spec:
  interval: 1m
  timeout: 30s
  url: http://platform-gitops-source.flux-system.svc.cluster.local/platform.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-base
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  timeout: 2m
  prune: false
  wait: false
  sourceRef:
    kind: GitRepository
    name: platform-gitops
  path: ./gitops/platform
