apiVersion: v1
kind: Namespace
metadata:
  name: platform-tests
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-test
  namespace: platform-tests
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: storage-test
  namespace: platform-tests
spec:
  restartPolicy: Never
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: storage-test
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: demo-cirros
  namespace: tenant-a
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: demo-cirros
    spec:
      domain:
        cpu:
          cores: 1
        resources:
          requests:
            memory: 256Mi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              password: demo
              chpasswd:
                expire: false
