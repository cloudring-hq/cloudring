apiVersion: v1
kind: Pod
metadata:
  name: isolate-a
  namespace: tenant-a
  labels:
    app: isolate-a
spec:
  restartPolicy: Never
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: isolate-a
      image: busybox:1.36
      command: ["sleep", "3600"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 65534
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: isolate-b
  namespace: tenant-b
  labels:
    app: isolate-b
spec:
  restartPolicy: Never
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: isolate-b
      image: busybox:1.36
      command: ["sh", "-c", "mkdir -p /tmp/www && echo tenant-b >/tmp/www/index.html && httpd -f -p 8080 -h /tmp/www"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 65534
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
