apiVersion: apps/v1
kind: Deployment
metadata:
  name: lb-test
  namespace: platform-tests
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lb-test
  template:
    metadata:
      labels:
        app: lb-test
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lb-test
  namespace: platform-tests
spec:
  type: LoadBalancer
  selector:
    app: lb-test
  ports:
    - name: http
      port: 80
      targetPort: 80
