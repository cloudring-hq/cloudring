apiVersion: v1
kind: Pod
metadata:
  name: capk-netcheck
  namespace: capk-system
  labels:
    app.kubernetes.io/name: capk-netcheck
spec:
  restartPolicy: Never
  containers:
    - name: check
      image: python:3.12-slim
      command:
        - python
        - -c
        - |
          import socket
          targets = [
              ("cluster-service", "claim-demo-cluster-lb.tenant-a.svc.cluster.local", 6443),
          ]
          failed = False
          for name, host, port in targets:
              sock = socket.socket()
              sock.settimeout(5)
              try:
                  sock.connect((host, port))
                  print(f"{name} {host}:{port} OK")
              except OSError as exc:
                  failed = True
                  print(f"{name} {host}:{port} FAILED: {exc}")
              finally:
                  sock.close()
          raise SystemExit(1 if failed else 0)
