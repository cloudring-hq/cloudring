apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-backup-runtime-cutover-gates
  namespace: platform-system
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  deployment-order.md: |
    Production backup runtime deployment order:

    1. Promote the production cell substrate and verify storage, SDN, and object
       storage are production grade.
    2. Promote gitops/platform-production-backup so the production-cell Velero
       locations and contract-only backup blueprint exist first.
    3. Install Velero with EnableCSI plus node-agent data movement.
    4. Install CSI snapshot CRDs, snapshot-controller, and a production CSI
       driver that exposes a VolumeSnapshotClass for each protected storage
       class.
    5. Verify BackupStorageLocation phase Available.
    6. Verify VolumeSnapshotLocation reachable.
    7. Verify every protected namespace with CSI data movement has
       BackupRepository Ready and repository maintenance jobs.
    8. Verify object-lock or equivalent retention by proving delete/overwrite
       is denied before retention expiry.
    9. Wire OBJECT_STORE_SECRET_NAME through the production secret manager.
    10. Verify BackupPlan and RestoreRequest CRDs are installed and served.
    11. Apply gitops/platform-production-backup-runtime with Flux only after all
        gates above are captured.
    12. Replace the placeholder image tag and enable the canary patch so
        provider-backup-runtime-controller scales from 0 to 1 with
        RUNTIME_ENABLED=true and CANARY_SCOPE=provider-backup-runtime-canary.
    13. Run the smoke test against only the canary scope.
    14. After smoke passes, enable the HA patch so
        provider-backup-runtime-controller scales from 1 to 3.

    The platform-production-backup-runtime overlay is the only desired-state
    entry point for this bundle. It must not be referenced from gitops/platform,
    gitops/cells/lab-hyperv, or the contract-only production-backup bundle.
