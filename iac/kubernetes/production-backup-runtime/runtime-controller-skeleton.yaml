apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-backup-runtime-controller
  namespace: platform-system
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-backup-runtime-controller
  annotations:
    platform.privatecloud.local/template-only: "true"
rules:
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - backupplans
      - restorerequests
      - virtualmachineclaims
      - kubernetesclusterclaims
      - volumes
      - projects
      - selfserviceauditevents
    verbs: ["get", "list", "watch"]
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - backupplans/status
      - restorerequests/status
      - volumes/status
      - virtualmachineclaims/status
      - kubernetesclusterclaims/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["velero.io"]
    resources:
      - backups
      - restores
      - schedules
      - backupstoragelocations
      - volumesnapshotlocations
      - backuprepositories
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotcontents
      - volumesnapshotclasses
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-backup-runtime-controller
  annotations:
    platform.privatecloud.local/template-only: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-backup-runtime-controller
subjects:
  - kind: ServiceAccount
    name: provider-backup-runtime-controller
    namespace: platform-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-backup-runtime-reconciliation-contract
  namespace: platform-system
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
data:
  contract.md: |
    # Provider Backup Runtime Reconciliation Contract

    This ConfigMap is documentation for the future production controller
    implementation. It is template-only and must not be applied to the Hyper-V
    lab runtime by default.

    BackupPlan to Velero mapping:
    - BackupPlan.spec.schedule maps to Velero Schedule.spec.schedule.
    - BackupPlan target, destination, retention, and consistency fields map to
      Velero Schedule.spec.template, which is a Velero BackupSpec.
    - A one-shot provider backup action may create Velero Backup with the same
      BackupSpec template used by the Schedule.
    - Runtime status maps Velero Schedule and Backup results back to
      BackupPlan.status.phase, lastRun, lastSuccess, recoveryPoints, and
      conditions.

    RestoreRequest to Velero mapping:
    - RestoreRequest.spec.source.backupName maps to Velero
      Restore.spec.backupName.
    - RestoreRequest.spec.source.scheduleName may select the latest eligible
      backup produced by a Velero Schedule before creating the Restore.
    - RestoreRequest.spec.target.namespaceMapping maps to Velero
      Restore.spec.namespaceMapping.
    - RestoreRequest.spec.target.resourcePolicyRef maps to the Velero restore
      resource policy reference.
    - RestoreRequest.spec.target.resourceModifierRefs maps to the ordered
      restore resource modifiers used to rewrite namespaces, labels, ownership,
      or tenant-specific references.
    - Runtime status maps Velero Restore results back to
      RestoreRequest.status.veleroRestoreName, sourceBackupName, phase,
      completedAt, validationErrors, failureReason, and conditions.

    Preflight gates:
    - Velero server, EnableCSI, node-agent, BackupStorageLocation,
      VolumeSnapshotLocation, BackupRepository, VolumeSnapshotClass, CSI
      snapshot CRDs, and object-store credentials must be healthy before any
      Velero object is created.
    - Provider tenant authorization, source BackupPlan visibility, target
      namespace ownership, and restore approval must be checked before creating
      Backup, Schedule, or Restore resources.

    Fail-closed rules:
    - Unknown target kind, unsupported restore mode, malformed source,
      missing policy reference, unhealthy preflight, tenant mismatch, target
      collision, and missing approval must produce no Velero action.
    - Failed validation writes RestoreRequest status phase FailedValidation,
      validationErrors, failureReason, and an Accepted=False condition.
    - Admission webhooks for the production runtime must use failurePolicy Fail.
    - Cross-tenant restore is denied unless approval.allowCrossTenant and
      approval.providerApproved are both true.

    Copy versus in-place controls:
    - Copy is the default tenant-visible restore mode and requires namespace
      mapping for Namespace and KubernetesClusterClaim targets.
    - InPlace requires provider-admin approval and a target-kind-specific
      resource policy that excludes unsafe cluster-scoped objects.
    - Collision policy defaults to reject; replace behavior is allowed only for
      explicitly approved in-place restore.

    Target-kind coverage:
    - VirtualMachineClaim stays supported by the lab KubeVirt snapshot/copy
      backend and by the future production Velero path.
    - Volume maps to CSI VolumeSnapshot plus Velero CSI backup and restore.
    - Namespace maps to Velero namespace/resource filtering with namespace
      mapping and restore modifiers.
    - KubernetesClusterClaim maps to provider claim, CAPI/CAPK resources,
      control-plane secrets, gateway resources, and persistent control-plane
      volumes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-backup-runtime-controller
  namespace: platform-system
  labels:
    app.kubernetes.io/name: provider-backup-runtime-controller
    app.kubernetes.io/component: backup-runtime
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
    platform.privatecloud.local/promotion-target-replicas: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-backup-runtime-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provider-backup-runtime-controller
        app.kubernetes.io/component: backup-runtime
    spec:
      serviceAccountName: provider-backup-runtime-controller
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: provider-backup-runtime-controller
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: provider-backup-runtime-controller
              topologyKey: kubernetes.io/hostname
      containers:
        - name: provider-backup-runtime-controller
          image: registry.example.invalid/privatecloud/provider-backup-controller:REPLACE_WITH_VERSION
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --leader-election-lease=provider-backup-runtime-controller
            - --runtime-enabled=$(RUNTIME_ENABLED)
            - --canary-scope=$(CANARY_SCOPE)
            - --fail-closed=true
            - --enabled-target-kinds=VirtualMachineClaim,Volume,Namespace,KubernetesClusterClaim
            - --enabled-restore-modes=Copy,InPlace
            - --require-restore-policy-refs=true
            - --require-provider-admin-for-in-place=true
            - --deny-cross-tenant-restore-by-default=true
            - --status-failure-phase=FailedValidation
            - --velero-features=EnableCSI
            - --backup-storage-location=primary-offsite
            - --backup-storage-location-kind=BackupStorageLocation
            - --volume-snapshot-location=csi-primary
            - --volume-snapshot-location-kind=VolumeSnapshotLocation
            - --backup-repository-kind=BackupRepository
            - --volume-snapshot-class-kind=VolumeSnapshotClass
            - --metrics-address=:8080
            - --health-address=:8081
          env:
            - name: OBJECT_STORE_SECRET_NAME
              value: REPLACE_WITH_OBJECT_STORE_SECRET_NAME
            - name: RUNTIME_ENABLED
              value: "false"
            - name: CANARY_SCOPE
              value: disabled
            - name: RUNTIME_CUTOVER_MODE
              value: fail-closed
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: provider-backup-runtime-controller
  namespace: platform-system
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-backup-runtime-controller
---
apiVersion: v1
kind: Service
metadata:
  name: provider-backup-runtime-controller-metrics
  namespace: platform-system
  labels:
    app.kubernetes.io/name: provider-backup-runtime-controller
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  selector:
    app.kubernetes.io/name: provider-backup-runtime-controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
