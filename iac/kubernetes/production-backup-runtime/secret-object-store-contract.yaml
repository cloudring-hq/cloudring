apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-backup-runtime-secret-object-store-contract
  namespace: platform-system
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  contract.md: |
    Secret and object-store integration contract:

    - A production secret manager owns REPLACE_WITH_OBJECT_STORE_SECRET_NAME.
    - no object-store credentials are committed to Git, ConfigMaps, logs, or
      generated evidence.
    - BackupStorageLocation and VolumeSnapshotLocation credentials must be
      resolved from the same secret manager source of truth.
    - The object store must enable Object Lock or equivalent retention before
      immutable BackupPlans can be accepted.
    - Missing credentials, failed credential rotation, missing Object Lock,
      non-Available BackupStorageLocation, unreachable VolumeSnapshotLocation,
      or unhealthy BackupRepository must fail closed.
    - Runtime reconciliation may publish status and events, but it must never
      copy credential material into tenant namespaces.
