apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-backup-runtime-rollback-runbook
  namespace: platform-system
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  rollback.md: |
    Production backup runtime rollback and fail-closed runbook:

    Immediate stop:
    - Patch the provider-backup-runtime-controller Deployment to replicas: 0.
    - Patch RUNTIME_ENABLED=false if the canary or HA patch had enabled it.
    - Or suspend Flux Kustomization platform-production-backup-runtime while
      preserving the already-applied production backup contract.

    Fail closed:
    - fail closed is the default runtime safety posture during rollback.
    - Reject new BackupPlan and RestoreRequest runtime actions when the
      controller cannot validate tenant authorization, object-store retention,
      BackupStorageLocation, VolumeSnapshotLocation, BackupRepository, or
      VolumeSnapshotClass health.
    - Preserve existing BackupPlan and RestoreRequest status with an explicit
      degraded reason instead of attempting partial cross-tenant restores.

    Do not destroy recovery material:
    - do not delete BackupStorageLocation objects during rollback.
    - do not delete BackupRepository objects during rollback.
    - do not unlock object-store retention, object-lock policies, or immutable
      recovery points.
    - do not delete retained VolumeSnapshot or Velero Backup objects unless the
      backup owner and provider admin approve the cleanup.

    Recovery:
    - Restore the previous image tag or leave replicas at 0.
    - Capture audit events, controller logs, Velero backup/restore describes,
      and tenant isolation evidence before reenabling runtime reconciliation.
