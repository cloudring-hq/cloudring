apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: provider-scheduler-admission-webhook
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
webhooks:
  - name: scheduler-admission.platform.privatecloud.local
    admissionReviewVersions:
      - v1
    sideEffects: None
    failurePolicy: Fail
    matchPolicy: Equivalent
    timeoutSeconds: 5
    namespaceSelector:
      matchLabels:
        platform.privatecloud.local/scheduler-runtime-webhook: enabled
    objectSelector:
      matchLabels:
        platform.privatecloud.local/scheduler-runtime-admission: enabled
    clientConfig:
      service:
        namespace: platform-scheduler
        name: provider-scheduler-runtime-webhook
        path: /validate-scheduler-admission
        port: 443
      caBundle: REPLACE_WITH_PROVIDER_SCHEDULER_WEBHOOK_CA_BUNDLE
    rules:
      - apiGroups: ["platform.privatecloud.local"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources:
          - virtualmachineclaims
          - kubernetesclusterclaims
          - projects
          - capacityreservations
          - admissionjournals
        scope: "*"
