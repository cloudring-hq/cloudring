apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-scheduler-runtime-smoke-test-runbook
  namespace: platform-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  smoke-test.md: |
    Production scheduler runtime smoke test:

    1. Run verify-production-scheduler-runtime-admission-seam.ps1 locally and
       keep the deterministic admission fixture output as preflight evidence.
    2. Confirm kubectl get capacitycells reports every promoted cell Ready.
    3. Confirm kubectl get capacityreservations returns only expected
       pre-cutover records.
    4. Confirm kubectl get admissionjournals returns only expected pre-cutover
       records.
    5. Apply canary-enable-patch.example.yaml through the production GitOps
       promotion branch.
    6. Wait until provider-scheduler-runtime-controller runs 1/1 with
       RUNTIME_ENABLED=true and CANARY_SCOPE=provider-scheduler-runtime-canary.
    7. Label only the canary namespace with
       platform.privatecloud.local/scheduler-runtime-webhook=enabled and label
       only canary claims with
       platform.privatecloud.local/scheduler-runtime-admission=enabled.
    8. Create one canary VM claim and one canary tenant Kubernetes claim in an
       isolated project and verify ReservationIntent, QuotaAdmissionDecision,
       CapacityReservation, AdmissionJournal, and status payloads are coherent.
    9. Run a tenant isolation probe proving non-canary tenants cannot influence
       the canary project's quota, reservations, journals, or scheduler queue.
    10. Run lock-contention probes for project-quota-admission and
       capacity-admission Leases.
    11. If canary evidence is clean, apply ha-enable-patch.example.yaml and wait
       until provider-scheduler-runtime-controller runs 3/3.
    12. Delete only the canary provider claims and verify cleanup removes
        backing objects and active reservations while retaining AdmissionJournal
        audit history.

    If any step fails, rollback first, then collect diagnostics. Do not expand
    CANARY_SCOPE to production until cleanup and replay evidence are captured.
