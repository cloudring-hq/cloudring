apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-scheduler-replay-operations-contract
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
    app.kubernetes.io/component: scheduler-replay-operations
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
    platform.privatecloud.local/replay-operations-contract: "v1"
data:
  controller-owner: provider-scheduler-runtime-controller
  replay-mode-default: dry-run
  replay-lease-name: provider-scheduler-runtime-replay-owner
  replay-lease-namespace: platform-scheduler
  replay-lease-duration: 30s
  replay-renew-deadline: 20s
  replay-retry-period: 5s
  failover-grace-window: 45s
  repair-window-default: maintenance-only
  repair-window-min-duration: 15m
  replay-retention-boundary: replay windows must not exceed AdmissionJournal and CapacityReservation retention
  promotion-phases: disabled,dry-run,canary-apply,ha-apply
  canary-availability-caveat: canary replicas=1 is for smoke only and must not be treated as HA while the runtime PDB expects minAvailable=2
  apply-phase-requires: replay lease,green dry-run,green quota replay verifier,green admission seam verifier,tenant isolation probe,audit sink ready
  tenant-isolation-invariant: projectRef namespace must equal request namespace; cross-project replay is rejected before repair planning
  mutation-boundary: only CapacityReservation status, Project status, claim status, and provider audit Events may be patched during apply phases
  lab-boundary: not referenced by gitops/platform or gitops/cells/lab-hyperv
  audit-events: ReplayDryRunStarted,ReplayDecisionReconstructed,ReplayRepairPlanned,ReplayRepairApplied,ReplayRejected,ReplayFailoverObserved,ReplayLeaseLost
  status-conditions: ReplayDryRunReady,ReplayApplyReady,ReplayDegraded,ReplayRejected,ReplayLeaseLost
  failure-policy: fail-closed on missing lease settings, unsafe repair window, invalid promotion phase, missing audit taxonomy, or tenant scope mismatch
  rollback-policy: return to dry-run, scale runtime controller to 0, keep AdmissionJournal and CapacityReservation history intact
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-scheduler-replay-failover-drill
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
    app.kubernetes.io/component: scheduler-replay-operations
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
data:
  drill: |
    Production scheduler replay failover drill:
    1. Keep provider-scheduler-runtime-controller in dry-run unless every
       promotion gate is green.
    2. Confirm exactly one holder for Lease
       platform-scheduler/provider-scheduler-runtime-replay-owner.
    3. Create replay fixtures for one VirtualMachineClaim and one
       KubernetesClusterClaim in the canary project only.
    4. Run verify-production-scheduler-quota-replay-seam.ps1 and archive the
       JSON summaries before apply mode is considered.
    5. Kill or cordon the current replay owner and wait at least
       failover-grace-window before accepting a new owner.
    6. The new owner must emit ReplayFailoverObserved and then repeat dry-run
       reconstruction before any repair is applied.
    7. Reject replay windows longer than AdmissionJournal or
       CapacityReservation retention; rerun retention checks before apply mode.
    8. Cross-project, missing journal, stale generation, quota underflow, and
       quota overflow cases must emit ReplayRejected and no repair action.
    9. Tenant users may read only tenant-scoped status and audit records; they
       must not read AdmissionJournal or replay lease objects.
    10. Treat the one-replica canary as a smoke phase only; HA starts after the
        three-replica patch satisfies the runtime PDB.
    11. Roll back by returning replay-mode-default to dry-run, scaling the
       runtime controller to 0, and preserving AdmissionJournal,
       CapacityReservation, and Project quota history.
