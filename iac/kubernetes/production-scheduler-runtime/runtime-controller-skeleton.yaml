apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-scheduler-runtime-controller
  namespace: platform-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-scheduler-runtime-controller
  annotations:
    platform.privatecloud.local/template-only: "true"
rules:
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - capacitycells
      - capacityreservations
      - admissionjournals
      - projects
      - virtualmachineclaims
      - kubernetesclusterclaims
      - volumes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - capacityreservations
      - admissionjournals
    verbs: ["create", "update", "patch"]
  - apiGroups: ["platform.privatecloud.local"]
    resources:
      - capacityreservations/status
      - projects/status
      - virtualmachineclaims/status
      - kubernetesclusterclaims/status
      - volumes/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-scheduler-runtime-controller
  annotations:
    platform.privatecloud.local/template-only: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-scheduler-runtime-controller
subjects:
  - kind: ServiceAccount
    name: provider-scheduler-runtime-controller
    namespace: platform-scheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-scheduler-runtime-controller
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
    app.kubernetes.io/component: scheduler-runtime
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
    platform.privatecloud.local/promotion-target-replicas: "3"
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-scheduler-runtime-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provider-scheduler-runtime-controller
        app.kubernetes.io/component: scheduler-runtime
    spec:
      serviceAccountName: provider-scheduler-runtime-controller
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: provider-scheduler-runtime-controller
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: provider-scheduler-runtime-controller
              topologyKey: kubernetes.io/hostname
      containers:
        - name: provider-scheduler-runtime-controller
          image: registry.example.invalid/privatecloud/provider-scheduler-runtime:REPLACE_WITH_PROVIDER_SCHEDULER_RUNTIME_IMAGE
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --leader-election-lease=provider-scheduler-runtime-controller
            - --runtime-enabled=$(RUNTIME_ENABLED)
            - --canary-scope=$(CANARY_SCOPE)
            - --fail-closed=true
            - --admission-webhook-mode=fail-closed
            - --placement-model=filter-score-reserve-permit
            - --cell-source=CapacityCell
            - --reservation-kind=CapacityReservation
            - --journal-kind=AdmissionJournal
            - --quota-source=Project.status.quotaUsage
            - --optimistic-concurrency=resourceVersion
            - --project-quota-lock-prefix=project-quota-admission
            - --capacity-lock-prefix=capacity-admission
            - --webhook-address=:9443
            - --metrics-address=:8080
            - --health-address=:8081
          env:
            - name: RUNTIME_ENABLED
              value: "false"
            - name: CANARY_SCOPE
              value: disabled
            - name: RUNTIME_CUTOVER_MODE
              value: fail-closed
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
            - name: webhook
              containerPort: 9443
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: provider-scheduler-runtime-controller
  namespace: platform-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-scheduler-runtime-controller
---
apiVersion: v1
kind: Service
metadata:
  name: provider-scheduler-runtime-controller-metrics
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  selector:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: provider-scheduler-runtime-webhook
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
  annotations:
    platform.privatecloud.local/template-only: "true"
spec:
  selector:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
  ports:
    - name: https
      port: 443
      targetPort: webhook
