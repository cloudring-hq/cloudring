apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-scheduler-workqueue-runtime-contract
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
    app.kubernetes.io/component: scheduler-workqueue-runtime
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
    platform.privatecloud.local/workqueue-runtime-contract: "v1"
data:
  queue-owner: provider-scheduler-runtime-controller
  queue-mode-default: disabled
  queue-lease-name: provider-scheduler-runtime-workqueue-owner
  queue-lease-namespace: platform-scheduler
  queue-lease-duration: 30s
  event-sources: VirtualMachineClaim,KubernetesClusterClaim,Project,CapacityCell,CapacityReservation,AdmissionJournal
  durable-event-ledger-kind: SchedulerWorkQueueEvent
  durable-event-ledger-scope: cluster
  event-ordering: namespace,projectRef,claimKind,claimName,claimUID,generation,resourceVersion
  idempotency-key: claimUID:generation:resourceVersion:eventReason
  duplicate-policy: suppress duplicate idempotency keys before Filter or Reserve
  tenant-fairness-policy: weighted-round-robin per projectRef with max 4 consecutive events per project
  max-inflight-per-project: "2"
  max-inflight-global: "16"
  backoff-policy: exponential 5s,15s,45s,2m,5m with jitter
  dead-letter-after-attempts: "5"
  dead-letter-sink: provider-scheduler-workqueue-deadletter
  promotion-phases: disabled,dry-run,canary-consume,ha-consume
  failover-handoff: new queue owner must replay unacked SchedulerWorkQueueEvent records, then reconcile AdmissionJournal and CapacityReservation state, before consuming new events
  mutation-boundary: work queue may enqueue and emit audit/metric records only; backing objects are still gated by quota, reservation, journal, and replay contracts
  tenant-isolation-invariant: queue keys include namespace and projectRef; cross-tenant queue keys are rejected before enqueue
  metrics: scheduler_workqueue_depth,scheduler_workqueue_inflight,scheduler_workqueue_retries_total,scheduler_workqueue_deadletter_total,scheduler_workqueue_fairness_throttle_total
  audit-events: WorkQueueEventAccepted,WorkQueueDuplicateSuppressed,WorkQueueBackoffScheduled,WorkQueueDeadLettered,WorkQueueOwnerFailover,WorkQueueTenantThrottled
  failure-policy: fail-closed on missing queue owner, invalid promotion phase, unsafe fairness policy, duplicate identity conflict, dead-letter overflow, cross-tenant queue key, or missing audit metrics
  lab-boundary: not referenced by gitops/platform or gitops/cells/lab-hyperv
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-scheduler-workqueue-drill
  namespace: platform-scheduler
  labels:
    app.kubernetes.io/name: provider-scheduler-runtime-controller
    app.kubernetes.io/component: scheduler-workqueue-runtime
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/cutover-disabled-by-default: "true"
data:
  drill: |
    Production scheduler work-queue drill:
    1. Keep queue-mode-default disabled until scheduler runtime canary gates
       and replay operations gates are green.
    2. Confirm exactly one holder for Lease
       platform-scheduler/provider-scheduler-runtime-workqueue-owner.
    3. In dry-run, enqueue VM and KubernetesClusterClaim events from at least
       two projects and confirm weighted round robin prevents tenant starvation.
    4. Re-submit the same claim UID, generation, resourceVersion, and reason;
       the queue must emit WorkQueueDuplicateSuppressed before Filter or
       Reserve.
    5. Force transient admission dependency failures and verify exponential
       backoff, then dead-letter after five attempts with no backing object
       mutation.
    6. Kill or cordon the queue owner; the replacement must emit
       WorkQueueOwnerFailover and replay unacked SchedulerWorkQueueEvent
       records before reconciling AdmissionJournal and CapacityReservation
       state or consuming new events.
    7. Cross-tenant queue keys, invalid promotion phases, unsafe fairness
       policy, duplicate identity conflicts, dead-letter overflow, and missing
       metrics must fail closed.
