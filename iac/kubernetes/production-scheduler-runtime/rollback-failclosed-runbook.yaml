apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-scheduler-runtime-rollback-failclosed-runbook
  namespace: platform-scheduler
  annotations:
    platform.privatecloud.local/template-only: "true"
data:
  rollback.md: |
    Production scheduler runtime rollback and fail-closed runbook:

    Immediate rollback options:
    - Patch provider-scheduler-runtime-controller to replicas: 0.
    - Set RUNTIME_ENABLED=false and RUNTIME_CUTOVER_MODE=fail-closed.
    - suspend Flux Kustomization for platform-production-scheduler-runtime if
      GitOps keeps reapplying the canary or HA patch.

    Fail-closed invariants:
    - The runtime must fail closed whenever scheduler health, webhook
      certificates, quota locks, capacity locks, or replay ownership are
      uncertain.
    - Admission webhooks keep failurePolicy Fail until the old provider
      controller admission path is deliberately restored.
    - Pending claims must stay PendingAdmission or Rejected, never partially
      admitted, when locks, quota, capacity, or webhook health are uncertain.
    - Rollback must not delete CapacityReservation records.
    - Operator command rule: do not delete CapacityReservation objects while
      rolling back the scheduler runtime.
    - Rollback must not delete AdmissionJournal records.
    - Operator command rule: do not delete AdmissionJournal objects while
      rolling back the scheduler runtime.
    - Rollback must not delete CapacityCell inventory or quota history.
    - Operator command rule: do not delete CapacityCell inventory while rolling
      back the scheduler runtime.
    - Rejected claims must not retain Active reservations.

    After rollback, rerun the provider API contract, capacity admission lock,
    project quota admission lock, and claim lifecycle verifiers before any
    second promotion attempt.
