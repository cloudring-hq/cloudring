apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-portal
  namespace: platform-system
  labels:
    app: provider-portal
spec:
  replicas: 6
  selector:
    matchLabels:
      app: provider-portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: provider-portal
      annotations:
        platform.privatecloud.local/identity-mode: "oidc-jwks"
    spec:
      serviceAccountName: provider-portal
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 3
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          matchLabelKeys:
            - pod-template-hash
          labelSelector:
            matchLabels:
              app: provider-portal
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: provider-portal
                topologyKey: kubernetes.io/hostname
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portal
          image: localhost/platform-provider-portal:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: ENABLE_WRITE_API
              value: "true"
            - name: PORTAL_WRITE_AUTH_MODE
              value: "oidc-jwks"
            - name: PORTAL_PLATFORM_ADMIN_GROUP
              value: "platform:admins"
            - name: PORTAL_PROJECT_AUDIT_NAMESPACE
              value: "platform-system"
            - name: PORTAL_JWT_ISSUER
              value: "https://issuer.platform.local"
            - name: PORTAL_JWT_AUDIENCE
              value: "platform-portal"
            - name: PORTAL_JWT_JWKS_URI
              value: "http://provider-portal.platform-system.svc.cluster.local/oidc/jwks.json"
            - name: PORTAL_JWT_ALLOWED_ALGORITHMS
              value: "RS256"
            - name: PORTAL_JWT_JWKS_JSON
              valueFrom:
                secretKeyRef:
                  name: provider-portal-auth
                  key: jwks.json
            - name: PORTAL_JWT_JWKS_CACHE_TTL_SECONDS
              value: "300"
            - name: PORTAL_JWT_GROUPS_CLAIM
              value: "groups"
            - name: PORTAL_JWT_NAMESPACES_CLAIM
              value: "platform_namespaces"
            - name: PORTAL_WRITE_RATE_LIMIT_WINDOW_SECONDS
              value: "10"
            - name: PORTAL_WRITE_RATE_LIMIT_MAX_REQUESTS
              value: "8"
            - name: PORTAL_WRITE_RATE_LIMIT_SCOPE
              value: "shared"
            - name: PORTAL_WRITE_RATE_LIMIT_NAMESPACE
              value: "platform-system"
            - name: SUMMARY_CACHE_TTL_SECONDS
              value: "30"
            - name: SUMMARY_CACHE_STALE_SECONDS
              value: "60"
            - name: SUMMARY_FORCE_FRESH_GRACE_SECONDS
              value: "20"
            - name: SUMMARY_MAX_EVENTS
              value: "50"
            - name: SUMMARY_MAX_AUDIT_EVENTS
              value: "200"
            - name: SUMMARY_MAX_ADMISSION_JOURNALS
              value: "50"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: provider-portal
  namespace: platform-system
  labels:
    app: provider-portal
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app: provider-portal
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: provider-portal
  namespace: platform-system
  labels:
    app: provider-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: provider-portal
  minReplicas: 6
  maxReplicas: 9
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Max
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: provider-portal
  namespace: platform-system
  labels:
    app: provider-portal
spec:
  type: LoadBalancer
  selector:
    app: provider-portal
  ports:
    - name: http
      port: 80
      targetPort: http
