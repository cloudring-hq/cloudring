apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-portal
  namespace: platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-portal-access
rules:
  - apiGroups: ["platform.privatecloud.local"]
    resources: ["projects", "productplans", "subscriptions", "orders", "capacitycells", "capacityreservations", "admissionjournals", "virtualmachineclaims", "kubernetesclusterclaims", "images", "volumes", "networks", "firewallrules", "backupplans", "restorerequests", "accessgrants", "selfserviceauditevents"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["platform.privatecloud.local"]
    resources: ["subscriptions", "orders", "virtualmachineclaims", "kubernetesclusterclaims", "volumes", "networks", "firewallrules", "accessgrants"]
    verbs: ["create", "delete"]
  - apiGroups: ["platform.privatecloud.local"]
    resources: ["projects", "productplans"]
    verbs: ["create", "delete"]
  - apiGroups: ["platform.privatecloud.local"]
    resources: ["selfserviceauditevents"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-portal-access
subjects:
  - kind: ServiceAccount
    name: provider-portal
    namespace: platform-system
roleRef:
  kind: ClusterRole
  name: provider-portal-access
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: provider-portal-rate-limit
  namespace: platform-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: provider-portal-rate-limit
  namespace: platform-system
subjects:
  - kind: ServiceAccount
    name: provider-portal
    namespace: platform-system
roleRef:
  kind: Role
  name: provider-portal-rate-limit
  apiGroup: rbac.authorization.k8s.io
---
