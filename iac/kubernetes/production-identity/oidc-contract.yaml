apiVersion: v1
kind: ConfigMap
metadata:
  name: provider-portal-oidc-contract
  namespace: platform-system
  labels:
    app: provider-portal
    platform.privatecloud.local/component: identity
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/requires-code-cutover: "provider-portal-jwks"
data:
  issuer: "REPLACE_WITH_OIDC_ISSUER"
  audience: "platform-portal"
  jwksUri: "REPLACE_WITH_OIDC_JWKS_URI"
  discoveryUrl: "REPLACE_WITH_OIDC_DISCOVERY_URL"
  authorizationEndpoint: "REPLACE_WITH_OIDC_AUTHORIZATION_ENDPOINT"
  tokenEndpoint: "REPLACE_WITH_OIDC_TOKEN_ENDPOINT"
  subjectClaim: "sub"
  groupsClaim: "groups"
  namespacesClaim: "platform_namespaces"
  adminGroup: "platform:admins"
  requiredSigningAlgorithms: "RS256,ES256"
---
apiVersion: v1
kind: Secret
metadata:
  name: provider-portal-oidc-client
  namespace: platform-system
  labels:
    app: provider-portal
    platform.privatecloud.local/component: identity
  annotations:
    platform.privatecloud.local/template-only: "true"
    platform.privatecloud.local/requires-secret-manager: "true"
type: Opaque
stringData:
  client-id: "REPLACE_WITH_OIDC_CLIENT_ID"
  client-secret: "REPLACE_WITH_OIDC_CLIENT_SECRET_FROM_SECRET_MANAGER"
  cookie-secret: "REPLACE_WITH_32_BYTE_RANDOM_BASE64_COOKIE_SECRET"
