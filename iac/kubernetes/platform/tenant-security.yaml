apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a
  labels:
    tenant: tenant-a
    platform.privatecloud.local/tenant-tier: shared-vm
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-b
  labels:
    tenant: tenant-b
    platform.privatecloud.local/tenant-tier: shared-vm
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: tenant-a
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: tenant-b
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-object-quota
  namespace: tenant-a
spec:
  hard:
    configmaps: "50"
    secrets: "50"
    services: "20"
    services.loadbalancers: "0"
    count/virtualmachines.kubevirt.io: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-object-quota
  namespace: tenant-b
spec:
  hard:
    configmaps: "50"
    secrets: "50"
    services: "20"
    services.loadbalancers: "0"
    count/virtualmachines.kubevirt.io: "10"
