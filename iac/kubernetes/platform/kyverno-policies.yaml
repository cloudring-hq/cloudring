apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: tenant-guardrails
  annotations:
    policies.kyverno.io/title: Tenant Guardrails
    policies.kyverno.io/category: Multi-Tenancy
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: deny-tenant-loadbalancers
      match:
        any:
          - resources:
              kinds: ["Service"]
              namespaces: ["tenant-*"]
      validate:
        message: "Tenant namespaces cannot create LoadBalancer Services directly; request provider-managed exposure."
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.type || '' }}"
                operator: Equals
                value: LoadBalancer
            any:
              - key: "{{ request.userInfo.username || '' }}"
                operator: NotEquals
                value: system:serviceaccount:platform-system:provider-controller
              - key: "{{ request.object.metadata.labels.\"platform.privatecloud.local/routed-endpoint\" || '' }}"
                operator: NotEquals
                value: tenant-kubernetes-api
    - name: deny-tenant-host-network
      match:
        any:
          - resources:
              kinds: ["Pod"]
              namespaces: ["tenant-*"]
      validate:
        message: "Tenant pods cannot use hostNetwork, hostPID, or hostIPC."
        pattern:
          spec:
            =(hostNetwork): "false"
            =(hostPID): "false"
            =(hostIPC): "false"
    - name: deny-tenant-network-attachment-definitions
      match:
        any:
          - resources:
              kinds: ["NetworkAttachmentDefinition"]
              namespaces: ["tenant-*"]
      validate:
        message: "Tenant-created secondary networks require provider approval."
        deny: {}
    - name: deny-kubevirt-host-devices
      match:
        any:
          - resources:
              kinds: ["VirtualMachine"]
              namespaces: ["tenant-*"]
      validate:
        message: "Tenant VMs cannot request hostDevices directly."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.template.spec.domain.devices.hostDevices || `[]` | length(@) }}"
                operator: GreaterThan
                value: 0
