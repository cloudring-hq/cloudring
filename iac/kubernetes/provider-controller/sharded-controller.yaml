                    app.kubernetes.io/component: controller
                    platform.privatecloud.local/controller-shard: "0"
                topologyKey: kubernetes.io/hostname
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: localhost/platform-provider-controller:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: RECONCILE_INTERVAL_SECONDS
              value: "15"
            - name: POD_NAME
