  selector:
    matchLabels:
      app.kubernetes.io/name: provider-controller
      app.kubernetes.io/component: controller
      platform.privatecloud.local/controller-shard: "0"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
