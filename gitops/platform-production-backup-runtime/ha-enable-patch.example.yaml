apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-backup-runtime-controller
  namespace: platform-system
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: provider-backup-runtime-controller
          env:
            - name: RUNTIME_ENABLED
              value: "true"
            - name: CANARY_SCOPE
              value: production
            - name: RUNTIME_CUTOVER_MODE
              value: production
