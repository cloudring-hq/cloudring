name: Sync public main

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-main-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Push private main to public mirror
    runs-on: ubuntu-latest

    steps:
      - name: Check out private main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure public mirror deploy key
        env:
          PUBLIC_SYNC_DEPLOY_KEY: ${{ secrets.PUBLIC_SYNC_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$PUBLIC_SYNC_DEPLOY_KEY" ]; then
            echo "PUBLIC_SYNC_DEPLOY_KEY is not configured" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PUBLIC_SYNC_DEPLOY_KEY" > ~/.ssh/cloudring-public-sync
          chmod 600 ~/.ssh/cloudring-public-sync
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host github.com
            IdentityFile ~/.ssh/cloudring-public-sync
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Sync main and prune public branches
        run: |
          set -euo pipefail

          public_repo="git@github.com:cloudring-hq/cloudring.git"
          git remote add public "$public_repo"

          public_main_sha="$(git ls-remote --heads "$public_repo" refs/heads/main | awk '{print $1}')"
          if [ -n "$public_main_sha" ]; then
            git push --force-with-lease=refs/heads/main:"$public_main_sha" public HEAD:refs/heads/main
          else
            git push public HEAD:refs/heads/main
          fi

          git ls-remote --heads "$public_repo" |
            awk '{print $2}' |
            sed 's#^refs/heads/##' |
            while IFS= read -r branch; do
              if [ "$branch" != "main" ]; then
                git push public --delete "$branch"
              fi
            done
